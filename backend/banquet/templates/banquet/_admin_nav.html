{% load static %}
<nav class="border-b border-gold/30 bg-black/40 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-wrap items-center justify-between gap-4">
        <a href="{% url 'admin_dashboard' %}" class="text-2xl font-heading text-gold tracking-tight">
            Apotheosis ACE <span class="text-sm font-body" style="color: var(--muted);">— Admin</span>
        </a>
        
        <div class="flex flex-wrap items-center gap-2">
            <a href="{% url 'admin_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}" data-testid="nav-dashboard">
                <i data-lucide="layout-dashboard" width="16" height="16"></i>
                Accueil
            </a>
            <a href="{% url 'admin_tables' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_tables' %}active{% endif %}" data-testid="nav-tables">
                <i data-lucide="table" width="16" height="16"></i>
                Tables
            </a>
            <a href="{% url 'admin_menu' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_menu' %}active{% endif %}" data-testid="nav-menu">
                <i data-lucide="utensils" width="16" height="16"></i>
                Menu
            </a>
            <a href="{% url 'admin_results' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_results' %}active{% endif %}" data-testid="nav-results">

            </a>

                    Déconnexion
                </button>
