{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Apothéose ACE{% endblock %}</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Cormorant Garamond + Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-hover: #F3E5AB;
            --fir-green: #0F2F20;
            --fir-green-dark: #0A1F15;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --muted: #A3B8B0;
            --border: rgba(212, 175, 55, 0.3);
        }
        
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: var(--fir-green);
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: -0.02em;
        }
        
        .font-heading { font-family: 'Cormorant Garamond', serif; }
        .font-body { font-family: 'Outfit', sans-serif; }
        
        .text-gold { color: var(--gold); }
        .bg-gold { background-color: var(--gold); }
        .border-gold { border-color: var(--gold); }
        
        .hero-bg {
            background-image: url('https://customer-assets.emergentagent.com/job_apotheosis-banquet/artifacts/hgtcuwyx_360_F_1529603602_E4lmIKqdjZTb6JOU2k7fHUkE4aiB3yOH.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0F2F20;
            background-blend-mode: multiply;
            position: relative;
        }
        
        .hero-overlay {
            background: linear-gradient(to bottom, rgba(15, 47, 32, 0.55), rgba(15, 47, 32, 0.75));
            min-height: 100vh;
        }
        
        .hero-overlay h1,
        .hero-overlay h2,
        .hero-overlay p {
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
        }
        
        .glass-surface {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: rgba(10, 10, 10, 0.5);
            border: 1px solid var(--border);
        }
        
        .btn-primary {
            background-color: var(--gold);
            color: var(--black);
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .btn-primary:hover {
            background-color: var(--gold-hover);
        }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .btn-secondary:hover {
            background-color: rgba(212, 175, 55, 0.1);
        }
        
        .btn-danger {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
            font-size: 0.875rem;
        }
        .btn-danger:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }
        
        .form-input {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--gold);
        }
        .form-input::placeholder {
            color: var(--muted);
        }
        
        .verse-text {
            font-style: italic;
            opacity: 0.9;
        }
        
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid;
        }
        .alert-success {
            background-color: rgba(34, 197, 94, 0.1);
            border-color: rgb(34, 197, 94);
            color: white;
        }
        .alert-error {
            background-color: rgba(153, 27, 27, 0.2);
            border-color: rgb(153, 27, 27);
            color: white;
        }
        .alert-warning {
            background-color: rgba(234, 179, 8, 0.1);
            border-color: rgb(234, 179, 8);
            color: white;
        }
        .alert-info {
            background-color: rgba(59, 130, 246, 0.1);
            border-color: rgb(59, 130, 246);
            color: white;
        }
        
        .nav-link {
            color: var(--muted);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-link:hover {
            color: var(--gold);
            background-color: rgba(212, 175, 55, 0.1);
        }
        .nav-link.active {
            color: var(--gold);
            background-color: rgba(212, 175, 55, 0.15);
        }
        
        .card {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: var(--gold);
        }
        
        .gold-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 2rem 0;
            opacity: 0.5;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    <script>
        // Initialiser les icônes Lucide
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
